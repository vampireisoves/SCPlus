proxy-groups:
  - icon: 'https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Static.png'
    include-all: false
    exclude-filter: (?i)Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    name: PROXY
    type: select
    proxies:
      - AUTO
      - HK AUTO
      - JP AUTO
      - TW AUTO
      - SG AUTO
      - US AUTO
      - AI
      - TikTok
      - Youtube
      - Gemini
      - Twitter优选
      - 手动选择
  - icon: 'https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/TikTok.png'
    include-all: false
    exclude-filter: (?i)Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    name: TikTok
    type: select
