      - TIKTOK-VN
      - TIKTOK-US
      - TIKTOK-JP
      - TIKTOK-SG
      - TIKTOK-TW
  - icon: 'https://cdn.jsdelivr.net/gh/Orz-3/mini@master/Color/Available.png'
    include-all: true
    exclude-filter: (?i)Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置
    name: 手动选择
    type: select
    proxies:
      - AUTO
